<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matches-live</title>
    <link rel="stylesheet" href="./assets/style/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
</head>
<body>
     <nav>
      <div class="logo">
        <a href="./index.html" rel="noopener noreffer">
          <i class="fa-regular fa-newspaper" style="color: rgb(13, 21, 35)"></i
        ></a>
        <a href="./index.html" rel="noopener noreffer" class="a-logo">
          <h1>global</h1>
        </a>
      </div>
      <ul class="nav-ul">
        <li><a href="./index.html" rel="noopener noreffer" class="a-logo" target="_blank">home</a></li>
        <li>
          <a href="./standings.html" rel="noopener noreffer" class="a-logo" target="_blank">standings</a>
        </li>
        <li>
          <a href="./matches.html" rel="noopener noreffer" class="a-logo live" target="_blank">live</a>
        </li>
        <li><a href="./states.html" rel="noopener noreffer" class="a-logo" target="_blank">states</a></li>
      </ul>
    </nav>
    <main>
        <div class="inputs">
            <div class="label">
            <label for="date">Date From</label><br>
            <input type="date" class="datefrom" id="datefrom" >
            </div>
            <div class="label">
            <label for="date">Date To</label><br>
            <input type="date" class="dateto" id="dateto" >
            <div class="weather  matches">
                 <div class="head">
                 <h3>live scores</h3>
                 <h5 class="live live2">live</h5>
                 </div>
                 <div class="ratings">
                   <div class="team-names">
                     <img
                       src="./images/download (3).jpg"
                       alt=""
                       width="20px"
                       height="20px"
                     />
                     <h4>AlAhly</h4>
                   </div>
                   <h4>2-1</h4>
                   <div class="team-names">
                     <img
                       src="./images/Zamalek_SC_logo.svg.png"
                       alt=""
                       width="20px"
                       height="20px"
                     />
                     <h4>Zamalelk</h4>
                   </div>
                 </div>
                 <hr />
                 <div class="ratings">
                   <div class="team-names">
                     <img
                       src="./images/download (1).png"
                       alt=""
                       width="20px"
                       height="20px"
                     />
                     <h4>Barcelona</h4>
                   </div>
                   <h4>10:00</h4>
                   <div class="team-names">
                     <img
                       src="./images/download.png"
                       alt=""
                       width="20px"
                       height="20px"
                     />
                     <h4>Real Madrid</h4>
                   </div>
                 </div>
                 <hr />
               </div>
            </div>
    </main>
    <script src="./js/main.js"></script>

</html>
